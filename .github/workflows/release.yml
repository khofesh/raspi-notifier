name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build for Raspberry Pi 4 (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o notifier-linux-arm64 .

      - name: Create release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: notifier-linux-arm64
